name: AI Robot Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install official Codex CLI
        run: npm install -g @openai/codex@0.125.0

      - name: Restore Codex OAuth config
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          test -n "$CODEX_AUTH_JSON"
          mkdir -p ~/.codex
          printf '%s' "$CODEX_AUTH_JSON" > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json

      - name: Verify Codex OAuth read-only headless mode
        run: |
          codex exec --model gpt-5.4-mini --sandbox read-only --ephemeral --ignore-user-config -c approval_policy=never -c model_reasoning_effort='"low"' --output-last-message /tmp/codex-smoke.txt "Respond with exactly: codex-oauth-ok"
          grep -q "codex-oauth-ok" /tmp/codex-smoke.txt

      - name: Run AI Robot Review
        uses: 777genius/multi-provider-code-review@fix/codex-oauth-exec
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_PROVIDERS: codex/gpt-5.4-mini
          PROVIDER_LIMIT: '1'
          PROVIDER_MAX_PARALLEL: '1'
          PROVIDER_RETRIES: '0'
          CODEX_HEALTHCHECK_MODE: exec
          CODEX_HEALTHCHECK_REASONING_EFFORT: low
          CODEX_REASONING_EFFORT: medium
          CODEX_AGENTIC_CONTEXT: 'true'
          CODEX_EVENT_AUDIT: 'true'
          FAIL_ON_NO_HEALTHY_PROVIDERS: 'true'
          INLINE_MAX_COMMENTS: '5'
          INLINE_MIN_SEVERITY: minor
          INLINE_MIN_AGREEMENT: '1'
          MIN_CONFIDENCE: '0'
          CONSENSUS_REQUIRED_FOR_CRITICAL: 'false'
          CONSENSUS_MIN_AGREEMENT: '1'
          ENABLE_AST_ANALYSIS: 'false'
          ENABLE_SECURITY: 'false'
          ENABLE_TEST_HINTS: 'false'
          ENABLE_AI_DETECTION: 'false'
          ENABLE_CACHING: 'false'
          INCREMENTAL_ENABLED: 'false'
          LEARNING_ENABLED: 'false'
          GRAPH_ENABLED: 'false'
